<div class="send-modal-backdrop" data-send-modal hidden>
  <div
    class="send-modal"
    role="dialog"
    aria-modal="true"
    aria-live="polite"
    aria-label="Sending message"
  >
    <p class="send-modal-text" data-send-status>Sending...</p>
    <p class="send-modal-hint" data-send-hint></p>
    <div class="send-modal-track">
      <span
        class="send-modal-envelope"
        data-send-envelope
        aria-hidden="true"
      ></span>
    </div>
  </div>
</div>
